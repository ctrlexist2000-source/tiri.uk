{{ define "main" }}

<section class="hero">
  <img class="hero-image" src="{{ "images/banner.png" | relURL }}" alt="Tiri" />
</section>

<section class="recent-section">
  <div class="container">
    <h2 class="section-heading">Najnowsze wpisy</h2>
    {{ $posts := where .Site.RegularPages "Section" "posts" | first 10 }}
    <div class="post-grid">
      {{ range $posts }}
      <article class="post-card">
        <a href="{{ .Permalink }}">
          <span class="post-date">{{ .Date.Format "02 Jan 2006" }}</span>
          <h3 class="post-title">{{ .Title }}</h3>
          <p class="post-summary">{{ .Summary | truncate 100 }}</p>
        </a>
      </article>
      {{ end }}
    </div>
    <div class="shortcuts">
      <h2 class="shortcuts-title">Skróty</h2>
      <ul class="shortcuts-list">
        {{ range $posts }}
        <li><a href="{{ .Permalink }}" class="shortcut-link">— {{ .Title }}</a></li>
        {{ end }}
      </ul>
    </div>
  </div>
</section>

{{ end }}
