{{ define "main" }}

<section class="hero">
</section>

<section class="recent-section">
  <div class="container">

    <h2 class="section-heading">Recent Thoughts</h2>

    {{ $posts := (where .Site.RegularPages "Section" "posts") | sort "Date" "desc" | first 10 }}

    <div class="post-grid">

      {{ range $posts }}
      <article class="post-card">
        <a href="{{ .RelPermalink }}">
          <h3>{{ .Title }}</h3>
        </a>

        {{ if .Date }}
        <time>{{ .Date.Format "02 Jan 2006" }}</time>
        {{ end }}

        {{ if .Summary }}
        <p>{{ .Summary }}</p>
        {{ end }}

      </article>
      {{ end }}

    </div>

  </div>
</section>

{{ end }}
