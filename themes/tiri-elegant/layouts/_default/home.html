{{ define "main" }}
<div class="container">
  <!-- Banner -->
  <section class="banner">
    <h1 class="banner-title">Tiri Blog</h1>
    <p class="banner-sub">Najświeższe wpisy</p>
  </section>

  <!-- Recent posts grid -->
  <div class="post-grid">
    {{ $posts := .Site.RegularPages | first 10 }}
    {{ range $posts }}
      <article class="post-card">
        <a href="{{ .Permalink }}">
          <h3 class="post-title">{{ .Title }}</h3>
          <p class="post-summary">{{ .Summary }}</p>
          <span class="post-date">{{ .Date.Format "02 Jan 2006" }}</span>
        </a>
      </article>
    {{ end }}
  </div>

  <!-- Shortcuts list -->
  <section class="shortcuts">
    <h2 class="shortcuts-title">Skróty do najnowszych postów</h2>
    <ul class="shortcuts-list">
      {{ range $posts }}
        <li class="shortcut-item"><a href="{{ .Permalink }}" class="shortcut-link">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  </section>
</div>
{{ end }}
