<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Archiwum wszystkich wpisów — TIRI" />
  <title>Archives — TIRI</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Geist+Mono:wght@300;400&family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    /* === PODSTAWOWE STYLE (zsynchronizowane z index.html) === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --black: #000000;
      --grey-100: #f5f5f5;
      --grey-200: #e8e8e8;
      --grey-400: #999999;
      --grey-600: #555555;
      --serif: 'Cormorant Garamond', serif;
      --mono: 'Geist Mono', monospace;
      --sans: 'Geist', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body {
      background: var(--white);
      color: var(--black);
      font-family: var(--sans);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
    }

    /* NAV — identyczny jak na głównej */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.6rem 3rem;
      background: rgba(255,255,255,0.96);
      border-bottom: 1px solid var(--grey-200);
      backdrop-filter: blur(8px);
    }
    .nav-logo {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--black);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--mono);
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--grey-600);
    }
    .nav-links a:hover,
    .nav-links a[aria-current="page"] {
      color: var(--black);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 3rem;
    }

    .page-header {
      padding-top: 140px;
      margin-bottom: 6rem;
    }
    .page-header h1 {
      font-family: var(--serif);
      font-size: 3.8rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 0.8rem;
    }
    .page-header p {
      font-size: 1.05rem;
      color: var(--grey-600);
    }

    /* === ARCHIWUM === */
    .archive-year {
      margin-bottom: 6rem;
    }
    .archive-year-header {
      font-family: var(--serif);
      font-size: 2.8rem;
      font-weight: 300;
      margin-bottom: 2.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--black);
    }
    .archive-month {
      margin-bottom: 3rem;
    }
    .archive-month-header {
      font-family: var(--mono);
      font-size: 1.05rem;
      color: var(--grey-600);
      letter-spacing: 0.1em;
      margin-bottom: 1.4rem;
    }
    .archive-entry {
      padding: 1.4rem 0;
      border-bottom: 1px solid var(--grey-200);
      transition: background 0.3s;
    }
    .archive-entry:hover {
      background: var(--grey-100);
      padding-left: 1rem;
    }
    .archive-entry-title a {
      font-family: var(--serif);
      font-size: 1.5rem;
      color: inherit;
      text-decoration: none;
      line-height: 1.25;
    }
    .archive-entry-title a:hover {
      text-decoration: underline;
    }
    .archive-meta {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--grey-400);
      margin-top: 0.4rem;
    }

    footer {
      border-top: 1px solid var(--grey-200);
      padding: 3rem 0 2rem;
      margin-top: 8rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--grey-400);
      text-align: center;
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">TIRI</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/archives.html" aria-current="page">Archives</a></li>
      <li><a href="/about.html">O mnie</a></li>
    </ul>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Archives</h1>
      <p>Wszystkie wpisy • chronologicznie</p>
    </div>

    <!-- === PRZYKŁAD WPISÓW (2026) === -->
    <div class="archive-year">
      <h2 class="archive-year-header">2026</h2>

      <div class="archive-month">
        <div class="archive-month-header">MAJ 2026</div>
        <div class="archive-entry">
          <div class="archive-entry-title">
            <a href="/posts/2026-05-07-to-by-maj-pachniaa-saska-kepa/">To był maj, pachniała Saską Kępą</a>
          </div>
          <div class="archive-meta">7 maja 2026 • 3 min czytania</div>
        </div>
      </div>

      <!-- dodaj kolejne miesiące... -->
    </div>

    <!-- === 2025 === -->
    <div class="archive-year">
      <h2 class="archive-year-header">2025</h2>
      <!-- wpisy z 2025 -->
    </div>

  </div>

  <footer>
    © 2020–2026 TIRI • personal journal
  </footer>

</body>
</html>
