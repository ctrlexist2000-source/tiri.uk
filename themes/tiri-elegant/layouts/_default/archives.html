{{ define "main" }}
<div class="container">
  <h1>{{ .Title }}</h1>
  {{ $posts := where .Site.RegularPages "Section" "posts" }}
  {{ range $posts.GroupByDate "2006" }}
  <h2>{{ .Key }}</h2>
  <ul>
    {{ range .Pages }}
    <li>
      <span>{{ .Date.Format "02.01" }}</span>
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
  {{ end }}
</div>
{{ end }}
