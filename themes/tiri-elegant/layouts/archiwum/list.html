{{ define "main" }}
<div class="page-archives">
  <h1 class="section-heading">Archiwum</h1>
  <ul class="post-list">
    {{ range (where .Site.RegularPages "Section" "posts").ByDate.Reverse }}
    <li class="post-item">
      <a class="post-link" href="{{ .RelPermalink }}">
        <time class="post-date">{{ .Date.Format "02 Jan 2006" }}</time>
        <div class="post-info">
          <span class="post-title">{{ .Title }}</span>
        </div>
      </a>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
