{{ define "main" }}

<section class="hero">
</section>

<section class="recent-section">
  <div class="container">

    <h2 class="section-heading">Recent Thoughts</h2>

    <div class="post-grid">

      {{ range first 10 (where site.RegularPages "Section" "posts") }}

        <article class="post-card">

          <h3>
            <a href="{{ .RelPermalink }}">
              {{ .Title }}
            </a>
          </h3>

          <p>{{ .Summary }}</p>

        </article>

      {{ end }}

    </div>

  </div>
</section>

{{ end }}
