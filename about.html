<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archives — TIRI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Geist+Mono:wght@300;400&family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
  
  <style>
    /* === Wklej tutaj CAŁY <style> z index.html (od * do końca animacji) === */
    /* (żeby było identycznie) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff; --black: #000000; --grey-100: #f5f5f5;
      --grey-200: #e8e8e8; --grey-400: #999999; --grey-600: #555555;
      --serif: 'Cormorant Garamond', serif; --mono: 'Geist Mono', monospace;
      --sans: 'Geist', sans-serif;
    }

    body { background: var(--white); color: var(--black); font-family: var(--sans); font-weight: 300; }
    html { scroll-behavior: smooth; }

    /* NAV (taki sam jak na głównej) */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.6rem 3rem; background: rgba(255,255,255,0.96); border-bottom: 1px solid var(--grey-200); backdrop-filter: blur(8px); }
    .nav-logo { font-family: var(--serif); font-size: 1.5rem; font-weight: 600; letter-spacing: 0.12em; color: var(--black); text-decoration: none; }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 3rem; }

    .page-header { padding-top: 140px; margin-bottom: 5rem; }
    .page-header h1 { font-family: var(--serif); font-size: 3.8rem; font-weight: 300; letter-spacing: -0.02em; }

    /* Archiwum - styl jak stary Hugo */
    .archive-year { margin-bottom: 5.5rem; }
    .archive-year-header { font-family: var(--serif); font-size: 2.6rem; margin-bottom: 2.5rem; border-bottom: 1px solid var(--black); padding-bottom: 1rem; }
    .archive-month { margin-bottom: 2.8rem; }
    .archive-month-header { font-family: var(--mono); font-size: 1.1rem; color: var(--grey-600); margin-bottom: 1.2rem; letter-spacing: 0.08em; }
    .archive-entry { padding: 1.1rem 0; border-bottom: 1px solid var(--grey-200); }
    .archive-entry-title a { font-family: var(--serif); font-size: 1.48rem; color: inherit; text-decoration: none; }
    .archive-entry-title a:hover { text-decoration: underline; }
    .archive-meta { font-family: var(--mono); font-size: 0.78rem; color: var(--grey-400); margin-top: 0.3rem; }
  </style>
</head>
